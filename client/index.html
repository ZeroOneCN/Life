<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const themeKey = 'lifeos_theme';
        const fallbackTheme = 'dark';

        try {
          const storedTheme = window.localStorage.getItem(themeKey);
          const theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : fallbackTheme;

          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.setAttribute('data-theme', fallbackTheme);
          document.documentElement.style.colorScheme = fallbackTheme;
        }
      })();
    </script>
    <style>
      html {
        background: #010102;
        color-scheme: dark;
      }

      html[data-theme="light"] {
        background: #f6f7fb;
        color-scheme: light;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23010102'/%3E%3Cpath d='M20 18h10c10 0 14 6 14 14s-4 14-14 14H20z' fill='%235e6ad2'/%3E%3Ccircle cx='44' cy='20' r='6' fill='%2327a644'/%3E%3C/svg%3E"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>LifeOS Admin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
